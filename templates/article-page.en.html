<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{metaDescription}}">
  <title>{{title}} | Work in Japan Factory Guide</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
</head>
<body>
<header>
  <div class="header-inner">
    <div class="site-logo"><a href="index.html" style="color:#fff;text-decoration:none;">Work in Japan <span>Factory</span> Guide</a></div>
    <nav><ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#topics">Topics</a></li>
      <li><a href="index.html#articles">Articles</a></li>
      <li><a href="../index.html">🌐 Language</a></li>
    </ul></nav>
  </div>
</header>
<div class="article-header">
  <div class="container">
    <span class="badge">{{badge}}</span>
    <h1>{{title}}</h1>
    <p class="article-meta">Last updated: {{lastUpdated}} &nbsp;|&nbsp; {{readTimeMinutes}} min read</p>
  </div>
</div>
<img class="article-featured-img" src="{{imageUrl}}" alt="{{imageAlt}}">

<!-- ===== ARTICLE BODY ===== -->
<article class="article-body">
  <p>{{excerpt}}</p>
  {{bodyHtml}}
</article>

<footer>
  <div class="container">
    <p>&copy; 2026 Work in Japan Factory Guide. For informational purposes only.</p>
  </div>
</footer>
</body>
</html>
